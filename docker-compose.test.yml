services:
  test-db:
    image: postgres:16-alpine
    container_name: flux-test-db
    environment:
      POSTGRES_USER: flux_test
      POSTGRES_PASSWORD: flux_test_pass
      POSTGRES_DB: flux_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux_test -d flux_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flux-test-backend
    environment:
      DATABASE_URL: postgres://flux_test:flux_test_pass@test-db:5432/flux_test
      PORT: 3000
      JWT_SECRET: e2e-test-jwt-secret
    ports:
      - "3001:3000"
    depends_on:
      test-db:
        condition: service_healthy

  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flux-test-frontend
    ports:
      - "8081:80"
    depends_on:
      - test-backend
