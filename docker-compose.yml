version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flux-db
    environment:
      POSTGRES_USER: flux_user
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: flux
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
