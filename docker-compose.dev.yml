version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: bun run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://flux_user:secret123@db:5432/flux

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: bun run dev --host 0.0.0.0 --port 8080
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
